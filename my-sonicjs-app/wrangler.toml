name = "my-sonicjs-app"
main = "src/index.ts"
compatibility_date = "2025-05-05"
compatibility_flags = ["nodejs_compat"]

# Cloudflare account
account_id = "f9d6328dc3115e621758a741dda3d5c4"

# Cloudflare Workers settings
workers_dev = true

# D1 Database
# Note: database_name and database_id are automatically updated by GitHub Actions
[[d1_databases]]
binding = "DB"
database_name = "sonicjs-worktree-lane711-v3-beta-issue-triage"
database_id = "02e853a0-e3cc-49fb-990e-2b679513f10a"
migrations_dir = "./migrations"

# R2 Bucket for media storage (using CI bucket)
[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "sonicjs-ci-media"

# KV Cache (using CI namespace)
[[kv_namespaces]]
binding = "CACHE_KV"
id = "a16f8246fc294d809c90b0fb2df6d363"

# Cloudflare Email Service binding (send_email)
# remote = true requires valid Cloudflare auth; omit for local dev
[[send_email]]
name = "EMAIL"

# Environment variables
[vars]
ENVIRONMENT = "development"
CORS_ORIGINS = "http://localhost:8787,http://localhost:4321"
DEFAULT_FROM_EMAIL = "lane@sonicjs.com"
# CI preview secret — not sensitive (fresh DB per PR, no real user data).
# Production deployments must use `wrangler secret put BETTER_AUTH_SECRET` instead.
BETTER_AUTH_SECRET = "sonicjs-ci-preview-secret-32chars"

# Observability
[observability]
enabled = true
